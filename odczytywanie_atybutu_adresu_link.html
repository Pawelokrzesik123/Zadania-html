<body>
    <h1>odczytywanie atrybutu (adres linku) funkja getAttribute</h1>

        console.log(lista)
        console.log('pierwsy:'+ lista[0].getAttribute=('href'));
        console.log ('drugi:' + lista[1].getAttribute=('href'));


    </script>
